services:
  # ---------------------------------------------------------
  # 1. POSTGRESQL (Managed) - NO TIENE runtime, NI startCommand
  # ---------------------------------------------------------
  - type: pserv                 # <--- TIPO CRÍTICO: 'pserv' (Managed Postgres)
    name: n8n-db
    plan: free
    region: oregon
    # NO pongas: runtime, startCommand, buildCommand, repo, branch, dockerfilePath

  # ---------------------------------------------------------
  # 2. REDIS (Managed) - NO TIENE runtime, NI startCommand
  # ---------------------------------------------------------
  - type: redis                 # <--- TIPO CRÍTICO: 'redis' (Managed Redis)
    name: n8n-redis
    plan: free
    region: oregon
    ipAllowList: []             # OBLIGATORIO en Redis Free
    # NO pongas: runtime, startCommand, maxmemoryPolicy

  # ---------------------------------------------------------
  # 3. N8N WEB SERVICE (Este SÍ es 'web' y SÍ necesita build config)
  # ---------------------------------------------------------
  - type: web                   # <--- TIPO: 'web' (Servicio custom Docker)
    name: n8n
    runtime: docker             # <--- SOLO ESTE servicio lleva 'runtime: docker'
    repo: https://github.com/realfkt/n8n
    branch: master
    dockerfilePath: ./Dockerfile
    plan: free
    region: oregon
    # DISCO: Free tier Web Service NO soporta discos persistentes (comentado/eliminado)
    # disk:
    #   name: n8n-data
    #   mountPath: /home/node/.n8n
    #   sizeGB: 1
    envVars:
      # General
      - key: NODE_ENV
        value: production
      - key: GENERIC_TIMEZONE
        value: America/Santiago
      - key: N8N_HOST
        value: 0.0.0.0
      - key: N8N_PORT
        value: "5678"
      - key: N8N_PROTOCOL
        value: https
      - key: WEBHOOK_URL
        value: https://n8n.onrender.com  # Cambia tras 1er deploy por la URL real
      # Auth
      - key: N8N_BASIC_AUTH_ACTIVE
        value: "true"
      - key: N8N_BASIC_AUTH_USER
        value: admin
      - key: N8N_BASIC_AUTH_PASSWORD
        sync: false  # Configura manual en Dashboard > Environment
      # Postgres (Auto-link)
      - key: DB_TYPE
        value: postgresdb
      - key: DB_POSTGRESDB_DATABASE
        fromDatabase:
          name: n8n-db
          property: database
      - key: DB_POSTGRESDB_HOST
        fromDatabase:
          name: n8n-db
          property: host
      - key: DB_POSTGRESDB_PORT
        fromDatabase:
          name: n8n-db
          property: port
      - key: DB_POSTGRESDB_USER
        fromDatabase:
          name: n8n-db
          property: user
      - key: DB_POSTGRESDB_PASSWORD
        fromDatabase:
          name: n8n-db
          property: password
      # Redis (Queue Mode)
      - key: QUEUE_BULL_REDIS_HOST
        fromService:
          type: redis        # OBLIGATORIO en fromService para redis
          name: n8n-redis
          property: host
      - key: QUEUE_BULL_REDIS_PORT
        fromService:
          type: redis
          name: n8n-redis
          property: port
      - key: QUEUE_BULL_REDIS_PASSWORD
        fromService:
          type: redis
          name: n8n-redis
          property: connectionString
      # Queue Mode
      - key: EXECUTIONS_MODE
        value: queue
      - key: QUEUE_HEALTH_CHECK_ACTIVE
        value: "true"
    healthCheckPath: /healthz
    autoDeploy: true
