services:
  # 1. Base de Datos PostgreSQL (Managed)
  - type: pserv
    name: n8n-db
    plan: free
    region: oregon

  # 2. Redis para Colas (Queue Mode)
  - type: redis
    name: n8n-redis
    plan: free
    region: oregon
    ipAllowList: []  # OBLIGATORIO: [] = permite todas las IPs (necesario para que n8n se conecte)

  # 3. Servicio Web n8n (Build desde GitHub)
  - type: web
    name: n8n
    runtime: docker
    repo: https://github.com/realfkt/n8n
    branch: master
    dockerfilePath: ./Dockerfile
    plan: free
    region: oregon
    # DISK ELIMINADO: Free tier NO soporta discos persistentes en Web Services.
    # n8n guarda workflows/credenciales en Postgres. Archivos binarios se pierden en redeploy (limitación Free).
    envVars:
      # Config General
      - key: NODE_ENV
        value: production
      - key: GENERIC_TIMEZONE
        value: America/Santiago
      - key: N8N_HOST
        value: 0.0.0.0
      - key: N8N_PORT
        value: "5678"
      - key: N8N_PROTOCOL
        value: https
      # URL Pública (Actualiza tras primer deploy con la URL real que te dé Render)
      - key: WEBHOOK_URL
        value: https://n8n.onrender.com
      # Auth Básica
      - key: N8N_BASIC_AUTH_ACTIVE
        value: "true"
      - key: N8N_BASIC_AUTH_USER
        value: admin
      - key: N8N_BASIC_AUTH_PASSWORD
        sync: false  # Se configura manual en Dashboard > Environment > "Add Secret"
      # Conexión PostgreSQL (Auto-inyectada desde 'n8n-db')
      - key: DB_TYPE
        value: postgresdb
      - key: DB_POSTGRESDB_DATABASE
        fromDatabase:
          name: n8n-db
          property: database
      - key: DB_POSTGRESDB_HOST
        fromDatabase:
          name: n8n-db
          property: host
      - key: DB_POSTGRESDB_PORT
        fromDatabase:
          name: n8n-db
          property: port
      - key: DB_POSTGRESDB_USER
        fromDatabase:
          name: n8n-db
          property: user
      - key: DB_POSTGRESDB_PASSWORD
        fromDatabase:
          name: n8n-db
          property: password
      # Conexión Redis (Auto-inyectada desde 'n8n-redis')
      - key: QUEUE_BULL_REDIS_HOST
        fromService:
          type: redis          # OBLIGATORIO: tipo de servicio origen
          name: n8n-redis
          property: host
      - key: QUEUE_BULL_REDIS_PORT
        fromService:
          type: redis          # OBLIGATORIO
          name: n8n-redis
          property: port
      - key: QUEUE_BULL_REDIS_PASSWORD
        fromService:
          type: redis          # OBLIGATORIO
          name: n8n-redis
          property: connectionString # Redis free no expone 'password' solo, usa connectionString
      # Modo Cola (Escalable)
      - key: EXECUTIONS_MODE
        value: queue
      - key: QUEUE_HEALTH_CHECK_ACTIVE
        value: "true"
    healthCheckPath: /healthz
    autoDeploy: true
