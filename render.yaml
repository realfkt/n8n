services:
  # 1. Base de Datos PostgreSQL
  - type: pserv
    name: n8n-db
    plan: free
    region: oregon

  # 2. Redis para Colas
  - type: redis
    name: n8n-redis
    plan: free
    region: oregon
    maxmemoryPolicy: allkeys-lru

  # 3. Servicio Web n8n (BUILD DESDE TU REPO GITHUB)
  - type: web
    name: n8n
    runtime: docker
    # --- CONFIGURACIÓN BUILD DESDE GITHUB ---
    repo: https://github.com/realfkt/n8n
    branch: master
    dockerfilePath: ./Dockerfile  # El Dockerfile oficial está en la raíz del fork
    # ----------------------------------------
    plan: free
    region: oregon
    disk:
      name: n8n-data
      mountPath: /home/node/.n8n
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: GENERIC_TIMEZONE
        value: America/Santiago
      - key: N8N_HOST
        value: 0.0.0.0
      - key: N8N_PORT
        value: "5678"
      - key: N8N_PROTOCOL
        value: https
      - key: WEBHOOK_URL
        value: https://n8n.onrender.com
      - key: N8N_BASIC_AUTH_ACTIVE
        value: "true"
      - key: N8N_BASIC_AUTH_USER
        value: admin
      - key: N8N_BASIC_AUTH_PASSWORD
        sync: false
      - key: DB_TYPE
        value: postgresdb
      - key: DB_POSTGRESDB_DATABASE
        fromDatabase:
          name: n8n-db
          property: database
      - key: DB_POSTGRESDB_HOST
        fromDatabase:
          name: n8n-db
          property: host
      - key: DB_POSTGRESDB_PORT
        fromDatabase:
          name: n8n-db
          property: port
      - key: DB_POSTGRESDB_USER
        fromDatabase:
          name: n8n-db
          property: user
      - key: DB_POSTGRESDB_PASSWORD
        fromDatabase:
          name: n8n-db
          property: password
      - key: QUEUE_BULL_REDIS_HOST
        fromService:
          name: n8n-redis
          property: host
      - key: QUEUE_BULL_REDIS_PORT
        fromService:
          name: n8n-redis
          property: port
      - key: QUEUE_BULL_REDIS_PASSWORD
        fromService:
          name: n8n-redis
          property: password
      - key: EXECUTIONS_MODE
        value: queue
      - key: QUEUE_HEALTH_CHECK_ACTIVE
        value: "true"
    healthCheckPath: /healthz
    autoDeploy: true
