# render.yaml - Blueprint para n8n en Render Free Tier
# Guarda esto en la RAÍZ de tu repo realfkt/n8n

services:
  # 1. BASE DE DATOS POSTGRESQL (Gratis 90 días / 1GB en Render)
  - type: pserv
    name: n8n-db
    plan: free
    region: oregon
    postgresMajorVersion: 15

  # 2. REDIS (Opcional, para colas/rate limiting - Gratis 25MB)
  - type: redis
    name: n8n-redis
    plan: free
    region: oregon
    maxmemoryPolicy: allkeys-lru

  # 3. APP PRINCIPAL N8N
  - type: web
    name: n8n
    runtime: docker
    repo: https://github.com/realfkt/n8n
    branch: master
    # Usamos la imagen oficial de n8n, no necesitamos Dockerfile propio
    dockerImage: n8nio/n8n:latest
    plan: free
    region: oregon
    # ¡CLAVE! Disco persistente para que no pierdas el binario de n8n / config si no usas DB externa para todo
    # Pero como usamos Postgres externo, el disco es secundario. Lo pongo por si acaso.
    disk:
      name: n8n-data
      mountPath: /home/node/.n8n
      sizeGB: 1
    envVars:
      # --- CONFIG BÁSICA ---
      - key: NODE_ENV
        value: production
      - key: GENERIC_TIMEZONE
        value: America/Santiago
      - key: N8N_HOST
        value: 0.0.0.0
      - key: N8N_PORT
        value: "5678"
      - key: N8N_PROTOCOL
        value: https
      - key: WEBHOOK_URL
        # Render la rellena automáticamente si usas 'fromService', pero para n8n es mejor hardcodear la URL final
        # La cambias manualmente en Render Dashboard después del primer deploy si no sabes la URL exacta aún.
        value: https://n8n.onrender.com

      # --- AUTENTICACIÓN (CAMBIA ESTOS VALORES EN RENDER DASHBOARD DESPUÉS) ---
      - key: N8N_BASIC_AUTH_ACTIVE
        value: "true"
      - key: N8N_BASIC_AUTH_USER
        value: "admin"
      - key: N8N_BASIC_AUTH_PASSWORD
        sync: false # IMPORTANTE: Ponla manual en Render Dashboard -> Environment -> "Add Secret"

      # --- BASE DE DATOS POSTGRES (Conexión automática via Render) ---
      - key: DB_TYPE
        value: postgresdb
      - key: DB_POSTGRESDB_DATABASE
        fromDatabase:
          name: n8n-db
          property: database
      - key: DB_POSTGRESDB_HOST
        fromDatabase:
          name: n8n-db
          property: host
      - key: DB_POSTGRESDB_PORT
        fromDatabase:
          name: n8n-db
          property: port
      - key: DB_POSTGRESDB_USER
        fromDatabase:
          name: n8n-db
          property: user
      - key: DB_POSTGRESDB_PASSWORD
        fromDatabase:
          name: n8n-db
          property: password

      # --- REDIS (Opcional, para colas) ---
      - key: QUEUE_BULL_REDIS_HOST
        fromService:
          name: n8n-redis
          property: host
      - key: QUEUE_BULL_REDIS_PORT
        fromService:
          name: n8n-redis
          property: port
      - key: QUEUE_BULL_REDIS_PASSWORD
        fromService:
          name: n8n-redis
          property: password
      # Habilitar modo queue con redis (recomendado para producción)
      - key: EXECUTIONS_MODE
        value: queue
      - key: QUEUE_HEALTH_CHECK_ACTIVE
        value: "true"

    healthCheckPath: /healthz
    autoDeploy: true
